<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="Georgia, 'Times New Roman', serif">

  <!-- Background -->
  <rect width="1200" height="900" fill="#fafaf8"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1917" letter-spacing="1">DIAGRAMA ENTIDADE-RELACIONAMENTO CONCEITUAL</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#7a7570">Sistema de Gestao de Restaurantes Multi-Tenant</text>
  <line x1="80" y1="68" x2="1120" y2="68" stroke="#e0dbd4" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RELACIONAMENTOS (linhas) — desenhados ANTES das caixas -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- TENANT_PLAN possui TENANT -->
  <line x1="210" y1="155" x2="370" y2="200" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="260" y="168" font-size="10" fill="#7a7570" text-anchor="middle">possui</text>
  <!-- cardinalidades -->
  <text x="218" y="152" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="358" y="198" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- TENANT tem TENANT_SUBSCRIPTION -->
  <line x1="430" y1="230" x2="310" y2="330" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="355" y="268" font-size="10" fill="#7a7570" text-anchor="middle">assina</text>
  <text x="438" y="228" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="298" y="340" font-size="11" fill="#c96a2e" font-weight="bold">1</text>

  <!-- TENANT_PLAN tem TENANT_SUBSCRIPTION -->
  <line x1="210" y1="175" x2="290" y2="330" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="237" y="270" font-size="10" fill="#7a7570" text-anchor="middle">define</text>
  <text x="205" y="186" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="285" y="325" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- TENANT tem USER -->
  <line x1="500" y1="200" x2="630" y2="175" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="562" y="178" font-size="10" fill="#7a7570" text-anchor="middle">emprega</text>
  <text x="502" y="198" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="632" y="185" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- TENANT tem CUSTOMER -->
  <line x1="500" y1="215" x2="640" y2="270" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="565" y="230" font-size="10" fill="#7a7570" text-anchor="middle">cadastra</text>
  <text x="502" y="215" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="640" y="270" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- TENANT tem TABLE -->
  <line x1="480" y1="230" x2="480" y2="370" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="455" y="305" font-size="10" fill="#7a7570" text-anchor="middle">possui</text>
  <text x="472" y="228" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="472" y="385" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- TENANT tem CATEGORY -->
  <line x1="430" y1="230" x2="350" y2="380" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="378" y="295" font-size="10" fill="#7a7570" text-anchor="middle">organiza</text>
  <text x="432" y="228" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="348" y="378" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- TENANT tem PRODUCT -->
  <line x1="440" y1="235" x2="390" y2="490" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="400" y="360" font-size="10" fill="#7a7570" text-anchor="middle">oferece</text>
  <text x="442" y="233" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="388" y="488" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- CATEGORY classifica PRODUCT -->
  <line x1="350" y1="415" x2="360" y2="488" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="330" y="452" font-size="10" fill="#7a7570" text-anchor="middle">classifica</text>
  <text x="348" y="413" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="358" y="500" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- TENANT tem ORDER -->
  <line x1="500" y1="220" x2="680" y2="430" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="603" y="315" font-size="10" fill="#7a7570" text-anchor="middle">registra</text>
  <text x="502" y="220" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="676" y="440" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- CUSTOMER faz ORDER -->
  <line x1="680" y1="295" x2="700" y2="428" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="718" y="360" font-size="10" fill="#7a7570" text-anchor="middle">realiza</text>
  <text x="680" y="293" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="700" y="440" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- TABLE recebe ORDER -->
  <line x1="510" y1="400" x2="672" y2="450" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="586" y="418" font-size="10" fill="#7a7570" text-anchor="middle">recebe</text>
  <text x="510" y="400" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="672" y="462" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- ORDER contem ORDER_ITEM -->
  <line x1="700" y1="490" x2="620" y2="590" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="645" y="532" font-size="10" fill="#7a7570" text-anchor="middle">contem</text>
  <text x="700" y="490" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="618" y="600" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- PRODUCT aparece em ORDER_ITEM -->
  <line x1="415" y1="530" x2="575" y2="610" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="480" y="558" font-size="10" fill="#7a7570" text-anchor="middle">compoe</text>
  <text x="413" y="528" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="573" y="620" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- TENANT tem CASH_REGISTER -->
  <line x1="500" y1="215" x2="900" y2="370" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="720" y="268" font-size="10" fill="#7a7570" text-anchor="middle">opera</text>
  <text x="502" y="215" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="895" y="380" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- CASH_REGISTER tem CASH_MOVEMENT -->
  <line x1="930" y1="430" x2="930" y2="545" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="968" y="490" font-size="10" fill="#7a7570" text-anchor="middle">registra</text>
  <text x="930" y="428" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="930" y="557" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- TENANT tem TRANSACTION -->
  <line x1="500" y1="225" x2="870" y2="620" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="700" y="440" font-size="10" fill="#7a7570" text-anchor="middle">gera</text>
  <text x="502" y="225" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="866" y="625" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- ORDER gera TRANSACTION -->
  <line x1="750" y1="470" x2="870" y2="620" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="830" y="535" font-size="10" fill="#7a7570" text-anchor="middle">gera</text>
  <text x="750" y="470" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="866" y="618" font-size="11" fill="#c96a2e" font-weight="bold">1</text>

  <!-- USER abre CASH_REGISTER -->
  <line x1="700" y1="170" x2="900" y2="368" stroke="#b0a89e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="820" y="255" font-size="10" fill="#7a7570" text-anchor="middle">abre/fecha</text>
  <text x="698" y="168" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="895" y="366" font-size="11" fill="#c96a2e" font-weight="bold">N</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ENTIDADES                                              -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Helper: cada entidade é um retângulo com título -->
  <!-- Cor padrão: borda #4a7fa5, fill #eef4f8 -->
  <!-- Cor destaque (tenant): borda #c96a2e, fill #fdf0e8 -->

  <!-- TENANT_PLAN -->
  <rect x="100" y="110" width="120" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="100" y="110" width="120" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="100" y="120" width="120" height="8" fill="#4a7fa5"/>
  <text x="160" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PLANO</text>
  <text x="160" y="146" text-anchor="middle" font-size="10" fill="#3a5a75">(tenant_plans)</text>

  <!-- TENANT — entidade central destacada -->
  <rect x="370" y="180" width="140" height="55" rx="4" fill="#fdf0e8" stroke="#c96a2e" stroke-width="2.5"/>
  <rect x="370" y="180" width="140" height="20" rx="4" fill="#c96a2e"/>
  <rect x="370" y="192" width="140" height="8" fill="#c96a2e"/>
  <text x="440" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="white">RESTAURANTE</text>
  <text x="440" y="222" text-anchor="middle" font-size="10" fill="#7a4020">(tenants)</text>

  <!-- TENANT_SUBSCRIPTION -->
  <rect x="240" y="325" width="130" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="240" y="325" width="130" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="240" y="335" width="130" height="8" fill="#4a7fa5"/>
  <text x="305" y="338" text-anchor="middle" font-size="10" font-weight="bold" fill="white">ASSINATURA</text>
  <text x="305" y="360" text-anchor="middle" font-size="10" fill="#3a5a75">(tenant_subscriptions)</text>

  <!-- USER -->
  <rect x="620" y="140" width="110" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="620" y="140" width="110" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="620" y="150" width="110" height="8" fill="#4a7fa5"/>
  <text x="675" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="white">USUARIO</text>
  <text x="675" y="175" text-anchor="middle" font-size="10" fill="#3a5a75">(users)</text>

  <!-- CUSTOMER -->
  <rect x="630" y="255" width="115" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="630" y="255" width="115" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="630" y="265" width="115" height="8" fill="#4a7fa5"/>
  <text x="687" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CLIENTE</text>
  <text x="687" y="290" text-anchor="middle" font-size="10" fill="#3a5a75">(customers)</text>

  <!-- TABLE -->
  <rect x="440" y="368" width="90" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="440" y="368" width="90" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="440" y="378" width="90" height="8" fill="#4a7fa5"/>
  <text x="485" y="381" text-anchor="middle" font-size="11" font-weight="bold" fill="white">MESA</text>
  <text x="485" y="403" text-anchor="middle" font-size="10" fill="#3a5a75">(tables)</text>

  <!-- CATEGORY -->
  <rect x="290" y="375" width="110" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="290" y="375" width="110" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="290" y="385" width="110" height="8" fill="#4a7fa5"/>
  <text x="345" y="388" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CATEGORIA</text>
  <text x="345" y="410" text-anchor="middle" font-size="10" fill="#3a5a75">(categories)</text>

  <!-- PRODUCT -->
  <rect x="310" y="488" width="110" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="310" y="488" width="110" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="310" y="498" width="110" height="8" fill="#4a7fa5"/>
  <text x="365" y="501" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PRODUTO</text>
  <text x="365" y="523" text-anchor="middle" font-size="10" fill="#3a5a75">(products)</text>

  <!-- ORDER -->
  <rect x="655" y="428" width="110" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="655" y="428" width="110" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="655" y="438" width="110" height="8" fill="#4a7fa5"/>
  <text x="710" y="441" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PEDIDO</text>
  <text x="710" y="463" text-anchor="middle" font-size="10" fill="#3a5a75">(orders)</text>

  <!-- ORDER_ITEM -->
  <rect x="555" y="590" width="115" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="555" y="590" width="115" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="555" y="600" width="115" height="8" fill="#4a7fa5"/>
  <text x="612" y="603" text-anchor="middle" font-size="11" font-weight="bold" fill="white">ITEM PEDIDO</text>
  <text x="612" y="625" text-anchor="middle" font-size="10" fill="#3a5a75">(order_items)</text>

  <!-- CASH_REGISTER -->
  <rect x="860" y="365" width="130" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="860" y="365" width="130" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="860" y="375" width="130" height="8" fill="#4a7fa5"/>
  <text x="925" y="378" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CAIXA</text>
  <text x="925" y="400" text-anchor="middle" font-size="10" fill="#3a5a75">(cash_registers)</text>

  <!-- CASH_MOVEMENT -->
  <rect x="860" y="545" width="130" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="860" y="545" width="130" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="860" y="555" width="130" height="8" fill="#4a7fa5"/>
  <text x="925" y="558" text-anchor="middle" font-size="11" font-weight="bold" fill="white">MOV. CAIXA</text>
  <text x="925" y="580" text-anchor="middle" font-size="10" fill="#3a5a75">(cash_movements)</text>

  <!-- TRANSACTION -->
  <rect x="855" y="610" width="130" height="50" rx="4" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <rect x="855" y="610" width="130" height="18" rx="4" fill="#4a7fa5"/>
  <rect x="855" y="620" width="130" height="8" fill="#4a7fa5"/>
  <text x="920" y="623" text-anchor="middle" font-size="11" font-weight="bold" fill="white">TRANSACAO</text>
  <text x="920" y="645" text-anchor="middle" font-size="10" fill="#3a5a75">(transactions)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEGENDA                                                -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="80" y="790" width="430" height="80" rx="6" fill="#f5f3f0" stroke="#e0dbd4" stroke-width="1"/>
  <text x="295" y="810" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1917">LEGENDA</text>

  <rect x="100" y="820" width="50" height="20" rx="3" fill="#fdf0e8" stroke="#c96a2e" stroke-width="2"/>
  <text x="160" y="834" font-size="10" fill="#3a3530">Entidade central (Restaurante)</text>

  <rect x="100" y="848" width="50" height="20" rx="3" fill="#eef4f8" stroke="#4a7fa5" stroke-width="2"/>
  <text x="160" y="862" font-size="10" fill="#3a3530">Entidades do sistema</text>

  <line x1="320" y1="830" x2="380" y2="830" stroke="#b0a89e" stroke-width="1.5"/>
  <text x="320" y="826" font-size="11" fill="#c96a2e" font-weight="bold">1</text>
  <text x="375" y="826" font-size="11" fill="#c96a2e" font-weight="bold">N</text>
  <text x="400" y="834" font-size="10" fill="#3a3530">Relacionamento 1:N</text>

  <line x1="320" y1="858" x2="380" y2="858" stroke="#b0a89e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="862" font-size="10" fill="#3a3530">Relacionamento opcional</text>

  <!-- Rodape -->
  <text x="600" y="878" text-anchor="middle" font-size="10" fill="#b0a89e">UFAPE — Disciplina: Banco de Dados — 2026</text>

</svg>
